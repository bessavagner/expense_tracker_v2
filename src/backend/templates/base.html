<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>{% block title %}Expense Tracker{% endblock %}</title>
    {% load static %}
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap">
    <link rel="stylesheet" href="{% static 'css/tailwind.css' %}">
    <script>
        // Apply the saved theme before paint (no flash). No saved theme =>
        // DaisyUI auto-picks ledger / ledger-dark from the OS preference.
        (function () {
            try {
                var t = localStorage.getItem("theme");
                if (t) document.documentElement.setAttribute("data-theme", t);
            } catch (e) {}
        })();
    </script>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💰</text></svg>">
    <link rel="manifest" href="/manifest.webmanifest">
    <meta name="theme-color" content="#f5f3ef" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#0c1115" media="(prefers-color-scheme: dark)">
    <meta name="msapplication-TileColor" content="#147874">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Ledger">
    <link rel="apple-touch-icon" href="{% static 'images/pwa/apple-touch-icon.png' %}">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script defer src="https://unpkg.com/alpinejs@3.14.8/dist/cdn.min.js"></script>
</head>
<body class="min-h-screen bg-base-200" x-data="{ showToast: false, toastMessage: '', toastType: 'success' }"
      hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
      @show-toast.window="showToast = true; toastMessage = $event.detail.message; toastType = $event.detail.type || 'success'; setTimeout(() => showToast = false, 3000)">

    <!-- Side drawer (hamburger) wrapping the page -->
    <div class="drawer">
        <input id="nav-drawer" type="checkbox" class="drawer-toggle" />
        <div class="drawer-content flex flex-col min-h-screen">
            {% include "partials/_navbar.html" %}
            <main class="flex-1 p-4 pb-28 w-full max-w-7xl mx-auto">
                {% block content %}{% endblock %}
            </main>
        </div>
        <div class="drawer-side z-[100]">
            <label for="nav-drawer" aria-label="Fechar menu" class="drawer-overlay"></label>
            <ul class="menu bg-neutral text-neutral-content min-h-full w-64 p-4 gap-1">
                <li class="menu-title text-neutral-content/80 text-base mb-2">Expense Tracker</li>
                <li><a href="{% url 'finances:dashboard' %}" class="{% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">Dashboard</a></li>
                <li><a href="{% url 'finances:entries' %}" class="{% if request.resolver_match.url_name and 'entries' in request.resolver_match.url_name %}active{% endif %}">Entradas</a></li>
                <li><a href="{% url 'finances:consolidated' %}" class="{% if request.resolver_match.url_name and 'consolidated' in request.resolver_match.url_name %}active{% endif %}">Consolidado</a></li>
                <li><a href="{% url 'finances:settings' %}" class="{% if request.resolver_match.url_name and 'settings' in request.resolver_match.url_name %}active{% endif %}">Configurações</a></li>
                <li><a href="{% url 'finances:import_upload' %}" class="{% if request.resolver_match.url_name and 'import' in request.resolver_match.url_name %}active{% endif %}">Importar</a></li>
            </ul>
        </div>
    </div>

    <!-- Floating chat island (React) -->
    <div data-react-component="ChatWidget" data-api-url="/api/assistant/"></div>

    <!-- Floating "+" FAB: opens the shared entry modal; persists on every page -->
    <button id="fab-new-entry"
            class="fixed bottom-6 right-24 z-40 w-14 h-14 md:w-16 md:h-16 rounded-full bg-accent text-accent-content text-3xl shadow-lg hover:scale-110 transition-transform flex items-center justify-center"
            title="Nova entrada" aria-label="Nova entrada"
            hx-get="{% url 'finances:entry_modal' %}"
            hx-target="#entry-modal-content"
            hx-swap="innerHTML"
            onclick="document.getElementById('entry-modal').showModal()">+</button>

    {% include "partials/_toast.html" %}

    <!-- Modal container for entry form -->
    <dialog id="entry-modal" class="modal">
        <div class="modal-box w-11/12 max-w-lg" id="entry-modal-content">
            <!-- Content loaded via HTMX -->
        </div>
        <form method="dialog" class="modal-backdrop"><button>close</button></form>
    </dialog>

    <script type="module" src="{% static 'frontend/mount.js' %}"></script>
    <script>
      if ('serviceWorker' in navigator &&
          !['localhost', '127.0.0.1'].includes(location.hostname)) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('/sw.js');
        });
      }
    </script>
    <script>
      document.body.addEventListener('entry-saved', function () {
        const m = document.getElementById('entry-modal');
        if (m) m.close();
      });
    </script>
</body>
</html>
