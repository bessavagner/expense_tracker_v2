<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>{% block title %}Expense Tracker{% endblock %}</title>
    {% load static %}
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Hanken+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap">
    <link rel="stylesheet" href="{% static 'css/tailwind.css' %}">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💰</text></svg>">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script defer src="https://unpkg.com/alpinejs@3.14.8/dist/cdn.min.js"></script>
</head>
<body class="min-h-screen bg-base-200" x-data="{ showToast: false, toastMessage: '', toastType: 'success' }"
      @show-toast.window="showToast = true; toastMessage = $event.detail.message; toastType = $event.detail.type || 'success'; setTimeout(() => showToast = false, 3000)">

    {% include "partials/_navbar.html" %}

    <div class="flex" x-data="{ chatPinned: false, chatWidth: 380 }"
         @chat:pin.window="chatPinned = true; chatWidth = $event.detail?.width || 380"
         @chat:unpin.window="chatPinned = false"
         @chat:resize.window="chatWidth = $event.detail.width">
        <!-- Main content -->
        <main class="flex-1 p-4 w-full" :class="chatPinned ? '' : 'max-w-7xl mx-auto'">
            {% block content %}{% endblock %}
        </main>

        <!-- Chat widget (React island) -->
        <aside class="flex flex-col shrink-0"
               :class="chatPinned ? 'border-l border-base-300 min-h-[calc(100vh-4rem)]' : 'items-center pt-4'"
               :style="chatPinned ? 'width:' + chatWidth + 'px' : ''">
            <div data-react-component="ChatWidget" data-api-url="/api/assistant/"></div>
        </aside>
    </div>

    {% include "partials/_toast.html" %}

    <!-- Modal container for entry form -->
    <dialog id="entry-modal" class="modal">
        <div class="modal-box w-11/12 max-w-lg" id="entry-modal-content">
            <!-- Content loaded via HTMX -->
        </div>
        <form method="dialog" class="modal-backdrop"><button>close</button></form>
    </dialog>

    <script type="module" src="{% static 'frontend/mount.js' %}"></script>
</body>
</html>
