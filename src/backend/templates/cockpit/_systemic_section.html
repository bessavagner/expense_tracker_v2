{% load finance_filters %}
<div id="cockpit-systemic" class="card bg-base-100 border border-base-200 shadow-sm mb-4"
     hx-get="{% url 'finances:cockpit_systemic' current_year current_month %}"
     hx-trigger="systemic-changed from:body" hx-swap="outerHTML">
  <div class="card-body p-4">
    <div class="flex items-center justify-between mb-2">
      <h3 class="font-semibold flex items-center gap-2">🔁 Gastos sistemáticos do mês</h3>
      <button class="btn btn-ghost btn-xs"
              hx-get="{% url 'finances:entry_modal' %}?year={{ current_year }}&month={{ current_month }}&mode=systemic"
              hx-target="#entry-modal-content" hx-swap="innerHTML"
              onclick="document.getElementById('entry-modal').showModal()">+ novo</button>
    </div>

    <div class="overflow-x-auto">
    <table class="table table-sm">
      <tbody>
        {% for row in systemic_rows %}
        <tr class="{% if row.entry %}cursor-pointer hover:bg-base-200{% endif %}"
            {% if row.entry %}
            hx-get="{% url 'finances:cockpit_systemic_edit_modal' current_year current_month row.systemic.pk %}"
            hx-target="#entry-modal-content" hx-swap="innerHTML"
            onclick="document.getElementById('entry-modal').showModal()"
            {% endif %}>
          <td>{{ row.systemic.name }}</td>
          <td class="text-right whitespace-nowrap">
            {% if row.entry %}{{ row.entry.amount|money }}{% else %}<span class="opacity-50">não lançado</span>{% endif %}
          </td>
          <td class="text-right whitespace-nowrap">
            {% if row.entry %}
              <button class="btn btn-ghost btn-xs"
                      hx-delete="{% url 'finances:cockpit_systemic_delete' current_year current_month row.systemic.pk %}"
                      hx-target="#cockpit-systemic" hx-swap="outerHTML"
                      hx-confirm="Marcar como não ocorrido neste mês?"
                      onclick="event.stopPropagation()">não ocorreu</button>
            {% else %}
              <button class="btn btn-outline btn-xs"
                      hx-post="{% url 'finances:cockpit_systemic_post' current_year current_month row.systemic.pk %}"
                      hx-target="#cockpit-systemic" hx-swap="outerHTML">lançar {{ row.systemic.default_amount|money }}</button>
            {% endif %}
          </td>
        </tr>
        {% empty %}
        <tr><td colspan="3" class="text-center opacity-60">Nenhum gasto sistemático ativo.</td></tr>
        {% endfor %}
      </tbody>
    </table>
    </div>
  </div>
</div>
