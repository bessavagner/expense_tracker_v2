{% extends "base.html" %}
{% load finance_filters %}

{% block title %}Consolidado — {{ current_month|month_abbr }} {{ current_year }}{% endblock %}

{% block content %}
<div class="flex justify-between items-center mb-4">
    <h2 class="text-2xl font-bold">Consolidado</h2>
</div>

<div class="flex gap-2 items-center mb-4">
    <select class="select select-bordered min-w-[6rem]"
            onchange="htmx.ajax('GET', '/consolidated/{% if tab == 'systemics' %}systemics/{% endif %}?year={{ current_year }}&month=' + this.value, {target: '#consolidated-container', swap: 'innerHTML'})">
        {% for m in months %}
        <option value="{{ m }}" {% if m == current_month %}selected{% endif %}>{{ m|month_abbr }}</option>
        {% endfor %}
    </select>
    <select class="select select-bordered w-24"
            onchange="htmx.ajax('GET', '/consolidated/{% if tab == 'systemics' %}systemics/{% endif %}?month={{ current_month }}&year=' + this.value, {target: '#consolidated-container', swap: 'innerHTML'})">
        {% for y in year_range %}
        <option value="{{ y }}" {% if y == current_year %}selected{% endif %}>{{ y }}</option>
        {% endfor %}
    </select>
</div>

<!-- Sub-tabs -->
<div class="tabs tabs-bordered mb-4">
    <a class="tab {% if tab == 'diverse' %}tab-active{% endif %}"
       hx-get="{% url 'finances:consolidated' %}?year={{ current_year }}&month={{ current_month }}"
       hx-target="#consolidated-container"
       hx-swap="innerHTML">Gastos Diversos</a>
    <a class="tab {% if tab == 'systemics' %}tab-active{% endif %}"
       hx-get="{% url 'finances:consolidated_systemics' %}?year={{ current_year }}&month={{ current_month }}"
       hx-target="#consolidated-container"
       hx-swap="innerHTML">Gastos Sistemáticos</a>
</div>

<div id="consolidated-container">
    {% include "consolidated/_consolidated_table.html" %}
</div>
{% endblock %}
