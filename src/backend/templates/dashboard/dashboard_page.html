{% extends "base.html" %}
{% load static %}
{% load finance_filters %}

{% block title %}Dashboard — {{ current_month|stringformat:"02d" }}/{{ current_year }}{% endblock %}

{% block content %}
<div class="flex justify-between items-center mb-4">
    <h2 class="text-2xl font-bold">Dashboard</h2>
    <div class="flex gap-2 items-center">
        <select class="select select-bordered min-w-[6rem]"
                onchange="window.location.href='/?year={{ current_year }}&month=' + this.value">
            {% for m in months %}
            <option value="{{ m }}" {% if m == current_month %}selected{% endif %}>
                {{ m|month_abbr }}
            </option>
            {% endfor %}
        </select>
        <select class="select select-bordered min-w-[6rem]"
                onchange="window.location.href='/?year=' + this.value + '&month={{ current_month }}'">
            {% for y in year_range %}
            <option value="{{ y }}" {% if y == current_year %}selected{% endif %}>{{ y }}</option>
            {% endfor %}
        </select>
    </div>
</div>

<!-- React island cards grid (bento) -->
<div class="grid grid-cols-1 md:grid-cols-6 lg:grid-cols-12 gap-4 auto-rows-min items-stretch" id="dashboard-cards">
    <!-- Right column (Economia + Top Categorias) stacks beside the taller hero at lg -->
    <div class="bento-enter md:col-span-6 lg:col-span-8 lg:row-span-2 grid grid-cols-1 [&>*]:w-full" style="animation-delay:0ms"
         data-react-component="HeroSummaryCard"
         data-api-url="/api/dashboard/summary/?{{ api_params }}"
         data-spark-url="/api/dashboard/evolution/?{{ api_params }}"></div>
    <div class="bento-enter md:col-span-3 lg:col-span-4 grid grid-cols-1 [&>*]:w-full" style="animation-delay:60ms"
         data-react-component="EconomiaCard" data-api-url="/api/dashboard/diverse-savings/?{{ api_params }}"></div>
    <div class="bento-enter md:col-span-3 lg:col-span-4 grid grid-cols-1 [&>*]:w-full" style="animation-delay:120ms"
         data-react-component="TopCategoriesCard" data-api-url="/api/dashboard/top-categories/?{{ api_params }}"></div>

    <div class="bento-enter md:col-span-6 lg:col-span-12" style="animation-delay:180ms"
         data-react-component="DailyTrendCard" data-api-url="/api/dashboard/daily-trend/"></div>

    <div class="bento-enter md:col-span-3 lg:col-span-7" style="animation-delay:240ms"
         data-react-component="ProjectionCard" data-api-url="/api/dashboard/projection/?{{ api_params }}"></div>
    <div class="bento-enter md:col-span-3 lg:col-span-5" style="animation-delay:300ms"
         data-react-component="AlertsCard" data-api-url="/api/dashboard/alerts/?{{ api_params }}"></div>

    <div class="bento-enter md:col-span-6 lg:col-span-12" style="animation-delay:360ms"
         data-react-component="EvolutionCard" data-api-url="/api/dashboard/evolution/?{{ api_params }}"></div>

    <div class="bento-enter md:col-span-3 lg:col-span-6" style="animation-delay:420ms"
         data-react-component="RecentEntriesCard" data-api-url="/api/dashboard/recent-entries/?{{ api_params }}"></div>
    <div class="bento-enter md:col-span-3 lg:col-span-6" style="animation-delay:480ms"
         data-react-component="InstallmentsCard" data-api-url="/api/dashboard/installments/?{{ api_params }}"></div>
</div>

{% endblock %}
