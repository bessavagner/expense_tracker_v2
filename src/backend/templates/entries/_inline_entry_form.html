{% url 'finances:entry_create' as create_url %}
<form {% if create_url %}hx-post="{{ create_url }}"{% endif %}
      hx-target="#entries-tbody"
      hx-swap="afterbegin"
      hx-on::after-request="if(event.detail.successful) this.reset()"
      class="flex gap-2 p-2 bg-success/10 rounded-lg mb-2 items-end">
    {% csrf_token %}
    {{ form.date }}
    {{ form.amount }}
    {{ form.description }}
    {{ form.category }}
    {{ form.payment_method }}
    <button type="submit" class="btn btn-sm btn-accent">Salvar</button>
</form>
