{% extends "base.html" %}
{% load finance_filters %}

{% block title %}Projeção{% endblock %}

{% block content %}
<div class="flex justify-between items-center mb-4">
    <h2 class="text-2xl font-bold">Projeção</h2>
</div>

<form class="flex flex-wrap gap-2 items-end mb-4"
      hx-get="{% url 'finances:projection' %}"
      hx-target="#projection-container"
      hx-swap="innerHTML"
      hx-trigger="change">
    <label class="form-control">
        <span class="label-text text-xs mb-1">Início</span>
        <input type="month" name="start" value="{{ start_value }}"
               class="input input-bordered input-sm">
    </label>
    <label class="form-control">
        <span class="label-text text-xs mb-1">Meses</span>
        <select name="months" class="select select-bordered select-sm">
            {% for opt in month_options %}
            <option value="{{ opt }}" {% if opt == months_value %}selected{% endif %}>{{ opt }}</option>
            {% endfor %}
        </select>
    </label>
</form>

<div id="projection-container">
    {% include "projection/_projection_table.html" %}
</div>
{% endblock %}
